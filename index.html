<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Color Pong Arena</title>

<style>
body{
    margin:0;
    background:#0f172a;
    overflow:hidden;
    font-family:Arial;
}

canvas{
    display:block;
    margin:auto;
    background:#020617;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.6;
}
window.addEventListener("resize", resize);
resize();

// 🎨 COLORES
const colores = ["red","yellow","blue","lime"];

function randomColor(){
    return colores[Math.floor(Math.random()*colores.length)];
}

// 🎵 AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let musicStarted = false;

const notes = {
    C:261,
    D:294,
    E:329,
    G:392,
    A:440
};

const melody = [
    "A","G","E","D",
    "C","D","E","G",
    "E","D","C","A"
];

function play(freq, duration=0.35, vol=0.02){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    gain.gain.value = vol;

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

let step = 0;

function startMusic(){
    setInterval(()=>{
        play(notes[melody[step]],0.4,0.015);
        step = (step + 1) % melody.length;
    }, 520);
}

// 🟦 JUGADORES (mitad de tamaño + más cerca del borde)
function createPlayer(x){
    return {
        x,
        y:canvas.height/2-60, // 🔥 antes 120
        w:20,
        h:120, // 🔥 mitad de 240
        color:"white"
    }
}

// 🔥 más cerca del borde
const p1 = createPlayer(30);
const p2 = createPlayer(canvas.width - 50);

// ⚽ PELOTA (-20% velocidad inicial)
let ball = {
    x:canvas.width/2,
    y:canvas.height/2,
    dx:12.8,   // antes 16 → -20%
    dy:4,
    speed:1,
    color:randomColor()
};

let score = 0;
let gameOver = false;
let countdown = 0;

// 🧱 OBSTÁCULO
let obstacle = null;
let obstacleHP = 0;

// ⌨️ INPUT
const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key] = true;

    if(!musicStarted){
        startMusic();
        musicStarted = true;
    }

    if(e.key==="q") p1.color="red";
    if(e.key==="e") p1.color="yellow";
    if(e.key==="a") p1.color="blue";
    if(e.key==="d") p1.color="lime";

    if(e.key==="7") p2.color="red";
    if(e.key==="9") p2.color="yellow";
    if(e.key==="4") p2.color="blue";
    if(e.key==="6") p2.color="lime";

    if(e.key===" "){
        breakObstacle();
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

// 🎨 DRAW
function drawPlayer(p){
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x,p.y,p.w,p.h);
}

function drawBall(){
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,20,0,Math.PI*2);
    ctx.fillStyle = ball.color;
    ctx.fill();
}

function drawScore(){
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText(score, canvas.width/2,40);
}

function drawObstacle(){
    if(!obstacle) return;

    ctx.fillStyle = "white";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

    ctx.fillStyle = "black";
    ctx.font = "30px Arial";
    ctx.fillText(obstacleHP, obstacle.x + 50, obstacle.y + 80);
}

// 🔄 UPDATE
function update(){

    if(gameOver) return;

    if(keys["w"]) p1.y -= 9;
    if(keys["s"]) p1.y += 9;
    if(keys["8"]) p2.y -= 9;
    if(keys["5"]) p2.y += 9;

    ball.x += ball.dx * ball.speed;
    ball.y += ball.dy * ball.speed;

    if(ball.y < 0 || ball.y > canvas.height){
        ball.dy *= -1;
    }

    function hit(player, side){

        if(player.color !== ball.color){
            triggerGameOver();
            return;
        }

        let relative = (ball.y - (player.y + player.h/2)) / (player.h/2);

        ball.dy = relative * 7;
        ball.dx = side * Math.abs(ball.dx);

        ball.speed *= 1.02;
        ball.speed = Math.min(ball.speed, 10);

        score++;
        ball.color = randomColor();

        if(score % 10 === 0){
            spawnObstacle();
        }

        play(500);
    }

    // ❗ salida segura
    if(ball.x < -100 || ball.x > canvas.width + 100){
        triggerGameOver();
    }

    if(ball.x < p1.x + p1.w &&
       ball.y > p1.y &&
       ball.y < p1.y + p1.h){
        hit(p1, 1);
    }

    if(ball.x > p2.x &&
       ball.y > p2.y &&
       ball.y < p2.y + p2.h){
        hit(p2, -1);
    }

    if(obstacle){
        if(ball.x > obstacle.x &&
           ball.x < obstacle.x + obstacle.w &&
           ball.y > obstacle.y &&
           ball.y < obstacle.y + obstacle.h){

            ball.dx *= -1;
            ball.color = randomColor();
        }
    }
}

// 🧱 spawn obstacle
function spawnObstacle(){

    let level = Math.floor(score / 10);

    obstacle = {
        x:canvas.width/2 - 60,
        y:canvas.height/2 - 80,
        w:120,
        h:160
    };

    obstacleHP = Math.max(1, level);
}

// 💥 break obstacle
function breakObstacle(){
    if(!obstacle) return;

    obstacleHP--;

    play(800,0.1,0.05);

    if(obstacleHP <= 0){
        obstacle = null;
    }
}

// 🔴 GAME OVER
function triggerGameOver(){
    gameOver = true;
    countdown = 3;

    const interval = setInterval(()=>{
        countdown--;
        if(countdown <= 0){
            clearInterval(interval);
            reset();
        }
    },1000);
}

// 🔁 RESET
function reset(){
    gameOver = false;

    ball.x = canvas.width/2;
    ball.y = canvas.height/2;
    ball.dx = 12.8;
    ball.dy = 4;
    ball.speed = 1;

    score = 0;
    obstacle = null;
}

// 🎮 LOOP
function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawPlayer(p1);
    drawPlayer(p2);
    drawBall();
    drawScore();
    drawObstacle();

    update();

    if(gameOver){
        ctx.fillStyle = "rgba(255,0,0,0.85)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "white";
        ctx.font = "80px Arial";
        ctx.fillText(countdown, canvas.width/2 - 20, canvas.height/2);
    }

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
