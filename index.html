<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Color Pong Arena - Dificultad</title>

<style>
body{
    margin:0;
    background:#0f172a;
    overflow:hidden;
    font-family:Arial;
}

/* 🎮 MENU */
#menu{
    position:absolute;
    width:100%;
    height:100%;
    background:#020617;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    gap:20px;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    cursor:pointer;
    border-radius:10px;
}

.easy{background:#22c55e;}
.normal{background:#eab308;}
.hard{background:#ef4444;}

canvas{
    display:block;
    margin:auto;
    background:#020617;
}
</style>
</head>

<body>

<!-- 🎮 MENU -->
<div id="menu">
    <h1>COLOR PONG</h1>
    <h3>Selecciona dificultad</h3>

    <button class="easy" onclick="startGame(0.25)">FÁCIL (25%)</button>
    <button class="normal" onclick="startGame(0.5)">NORMAL (50%)</button>
    <button class="hard" onclick="startGame(1)">PRO (100%)</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.6;
}
window.addEventListener("resize", resize);
resize();

// 🎨 COLORES
const colores = ["red","yellow","blue","lime"];

function randomColor(){
    return colores[Math.floor(Math.random()*colores.length)];
}

// 🎵 AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let musicStarted = false;

const notes = {
    C:261,
    D:294,
    E:329,
    G:392,
    A:440
};

const melody = ["A","G","E","D","C","D","E","G","E","D","C","A"];

function play(freq, duration=0.35, vol=0.02){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = freq;
    gain.gain.value = vol;

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// 🟦 JUGADORES
function createPlayer(x){
    return {
        x,
        y:canvas.height/2-60,
        w:20,
        h:120,
        color:"white"
    }
}

let p1, p2, ball;
let score = 0;
let gameOver = false;
let countdown = 0;
let obstacle = null;
let obstacleHP = 0;
let speedMultiplier = 1;

// ⌨️ INPUT
const keys = {};

// 🎮 START GAME
function startGame(diff){

    speedMultiplier = diff;

    document.getElementById("menu").style.display = "none";

    p1 = createPlayer(canvas.width * 0.25);
    p2 = createPlayer(canvas.width * 0.75 - 20);

    ball = {
        x:canvas.width/2,
        y:canvas.height/2,
        dx:16 * speedMultiplier,
        dy:5 * speedMultiplier,
        speed:1,
        color:randomColor()
    };

    score = 0;
    gameOver = false;
    obstacle = null;

    if(!musicStarted){
        startMusic();
        musicStarted = true;
    }
}

// 🎵 MUSIC
function startMusic(){
    setInterval(()=>{
        play(notes[melody[Math.floor(Math.random()*melody.length)]],0.4,0.015);
    }, 500);
}

// INPUT
document.addEventListener("keydown", e=>{
    keys[e.key] = true;

    if(e.key==="q") p1.color="red";
    if(e.key==="e") p1.color="yellow";
    if(e.key==="a") p1.color="blue";
    if(e.key==="d") p1.color="lime";

    if(e.key==="7") p2.color="red";
    if(e.key==="9") p2.color="yellow";
    if(e.key==="4") p2.color="blue";
    if(e.key==="6") p2.color="lime";

    if(e.key===" "){
        breakObstacle();
    }
});

document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

// 🎨 DRAW
function drawPlayer(p){
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x,p.y,p.w,p.h);
}

function drawBall(){
    if(!ball) return;
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,20,0,Math.PI*2);
    ctx.fillStyle = ball.color;
    ctx.fill();
}

function drawScore(){
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText(score, canvas.width/2,40);
}

function drawObstacle(){
    if(!obstacle) return;

    ctx.fillStyle = "white";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);

    ctx.fillStyle = "black";
    ctx.font = "30px Arial";
    ctx.fillText(obstacleHP, obstacle.x + 40, obstacle.y + 80);
}

// 🔄 UPDATE
function update(){

    if(gameOver || !ball) return;

    if(keys["w"]) p1.y -= 9;
    if(keys["s"]) p1.y += 9;
    if(keys["8"]) p2.y -= 9;
    if(keys["5"]) p2.y += 9;

    ball.x += ball.dx * ball.speed;
    ball.y += ball.dy * ball.speed;

    if(ball.y < 0 || ball.y > canvas.height){
        ball.dy *= -1;
    }

    function hit(player, side){

        if(player.color !== ball.color){
            triggerGameOver();
            return;
        }

        let relative = (ball.y - (player.y + player.h/2)) / (player.h/2);

        ball.dy = relative * 7;
        ball.dx = side * Math.abs(ball.dx);

        ball.speed *= 1.02;

        score++;
        ball.color = randomColor();

        if(score % 10 === 0){
            spawnObstacle();
        }

        play(500);
    }

    if(ball.x < -100 || ball.x > canvas.width + 100){
        triggerGameOver();
    }

    if(ball.x < p1.x + p1.w &&
       ball.y > p1.y &&
       ball.y < p1.y + p1.h){
        hit(p1, 1);
    }

    if(ball.x > p2.x &&
       ball.y > p2.y &&
       ball.y < p2.y + p2.h){
        hit(p2, -1);
    }

    if(obstacle){
        if(ball.x > obstacle.x &&
           ball.x < obstacle.x + obstacle.w &&
           ball.y > obstacle.y &&
           ball.y < obstacle.y + obstacle.h){

            ball.dx *= -1;
            ball.color = randomColor();
        }
    }
}

// 🧱 obstacle
function spawnObstacle(){

    let level = Math.floor(score / 10);

    obstacle = {
        x:canvas.width/2 - 60,
        y:canvas.height/2 - 80,
        w:120,
        h:160
    };

    obstacleHP = Math.max(1, level);
}

// 💥 break
function breakObstacle(){
    if(!obstacle) return;

    obstacleHP--;
    play(800,0.1,0.05);

    if(obstacleHP <= 0){
        obstacle = null;
    }
}

// 🔴 GAME OVER
function triggerGameOver(){
    gameOver = true;
    countdown = 3;

    const interval = setInterval(()=>{
        countdown--;
        if(countdown <= 0){
            clearInterval(interval);
            reset();
        }
    },1000);
}

// 🔁 RESET
function reset(){
    gameOver = false;

    ball.x = canvas.width/2;
    ball.y = canvas.height/2;
    ball.dx = 16 * speedMultiplier;
    ball.dy = 5 * speedMultiplier;
    ball.speed = 1;

    score = 0;
    obstacle = null;
}

// 🎮 LOOP
function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(p1 && p2 && ball){
        drawPlayer(p1);
        drawPlayer(p2);
        drawBall();
        drawScore();
        drawObstacle();
    }

    update();

    if(gameOver){
        ctx.fillStyle = "rgba(255,0,0,0.85)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "white";
        ctx.font = "80px Arial";
        ctx.fillText(countdown, canvas.width/2 - 20, canvas.height/2);
    }

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
